name: Publish to PyPI

# Publishes the package to PyPI when a GitHub Release is published.
# Cut a release from a tag (e.g. v0.1.1) and this workflow builds the
# sdist + wheel and uploads them via PyPI Trusted Publishing (OIDC) —
# no API tokens or secrets required.
#
# One-time PyPI setup (https://pypi.org/manage/account/publishing/):
#   Project name:     paperless-ngx-erechnung
#   Owner:            bitbetterde
#   Repository:       paperless-ngx-erechnung
#   Workflow name:    publish.yml
#   Environment name: pypi

on:
  release:
    types: [published]
  # Allow a manual dry-run that builds artifacts without publishing.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Verify metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    # Only publish for an actual release event, never on manual dry-runs.
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/paperless-ngx-erechnung
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
